name: Boutique CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth
          - gateway
          - orders
          - order-service
          - product-service
          - user-service
          - frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login \
          --username AWS \
          --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker Image
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            BUILD_PATH="projects/boutique-microservices/frontend"
          else
            BUILD_PATH="projects/boutique-microservices/backend/services/${{ matrix.service }}"
          fi

          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}:$IMAGE_TAG"

          echo "Building $IMAGE_URI"

          docker build \
            -t $IMAGE_URI \
            $BUILD_PATH

      - name: Push Docker Image
        run: |
          IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/${{ matrix.service }}:$IMAGE_TAG"

          echo "Pushing $IMAGE_URI"

          docker push $IMAGE_URI

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitOps Manifests
        run: |
          TAG=${{ github.sha }}

          echo "Updating image tags to $TAG"

          find gitops/k8s -name "*.yml" | while read file
          do
            sed -Ei \
            "s|([0-9]+)\.dkr\.ecr\.${AWS_REGION}\.amazonaws\.com/([^:]+):.*|\1.dkr.ecr.${AWS_REGION}.amazonaws.com/\2:${TAG}|g" \
            "$file"
          done

          echo "Updated Images:"
          grep -R "image:" gitops/k8s

      - name: Commit Updated Manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add gitops/k8s

          if git diff --cached --quiet
          then
            echo "No manifest changes"
          else
            git commit -m "ci: update image tags to ${{ github.sha }}"
            git push origin main
          fi